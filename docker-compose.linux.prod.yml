version: '3.8'

services:
  # MongoDB Database (Linux Production)
  mongodb:
    image: mongo:7.0
    container_name: breakup-stories-mongodb-linux-prod
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: breakup_stories
    ports:
      - "localhost:27017:27017"  # Only accessible from localhost
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - breakup-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Spring Boot Application (Linux Production - Port 9100)
  breakup-stories-api:
    image: madhukinnera/breakup-stories-api:linux-latest
    container_name: breakup-stories-api-linux-prod
    restart: unless-stopped
    ports:
      - "localhost:9100:9100"  # Only accessible from localhost on port 9100
    environment:
      # Server Configuration
      SERVER_PORT: 9100
      
      # MongoDB Configuration
      SPRING_DATA_MONGODB_HOST: mongodb
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_DATA_MONGODB_DATABASE: breakup_stories
      SPRING_DATA_MONGODB_USERNAME: ${MONGO_ROOT_USERNAME:admin}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGO_ROOT_PASSWORD}
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      
      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:2592000000}
      
      # Email Configuration (Gmail)
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: ${GMAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${GMAIL_APP_PASSWORD}
      
      # Upload Service Configuration
      UPLOAD_SERVICE_URL: ${UPLOAD_SERVICE_URL}
      UPLOAD_SERVICE_ENDPOINT: ${UPLOAD_SERVICE_ENDPOINT:/api/v1/upload}
      
      # Audio Streaming Configuration
      AUDIO_BUFFER_SIZE: ${AUDIO_BUFFER_SIZE:8192}
      AUDIO_CACHE_DURATION: ${AUDIO_CACHE_DURATION:3600}
      AUDIO_MAX_RANGE_SIZE: ${AUDIO_MAX_RANGE_SIZE:1048576}
      AUDIO_ENABLE_CACHING: ${AUDIO_ENABLE_CACHING:true}
      
      # Logging (Production)
      LOGGING_LEVEL_COM_BREAKUPSTORIES: ${LOG_LEVEL:INFO}
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK: WARN
      LOGGING_LEVEL_ORG_MONGODB: WARN
      
      # Actuator (Production - limited endpoints)
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: never
      
      # Server Configuration (Linux optimized)
      SERVER_TOMCAT_THREADS_MAX: 200
      SERVER_TOMCAT_THREADS_MIN_SPARE: 10
      
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - breakup-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9100/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # Nginx Reverse Proxy (Optional - for load balancing and SSL termination)
  nginx:
    image: nginx:alpine
    container_name: breakup-stories-nginx-linux
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.linux.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # SSL certificates
    depends_on:
      - breakup-stories-api
    networks:
      - breakup-network
    profiles:
      - nginx  # Only start with --profile nginx

volumes:
  mongodb_data:
    driver: local

networks:
  breakup-network:
    driver: bridge 