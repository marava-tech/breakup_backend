services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: breakup-stories-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: madhu
      MONGO_INITDB_ROOT_PASSWORD: Madhu7814
      MONGO_INITDB_DATABASE: breakup_stories
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - breakup-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Spring Boot Application
  breakup-stories-api:
    image: madhukinnera/breakup-stories-api:latest
    container_name: breakup-stories-api
    restart: unless-stopped
    ports:
      - "9200:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://madhu:Madhu7814@mongodb:27017/breakup_stories?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - breakup-network

volumes:
  mongodb_data:
    driver: local

networks:
  breakup-network:
    driver: bridge 