server:
  port: 8080
  servlet:
    context-path: /

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:rA3jPjK6o0IBkSyKXZ8OEwTbU5z6a4NE2Kq+dfS2A3k=}
  expiration: 2592000000 # 30 days in milliseconds




logging:
  level:
    com.breakupstories: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
  metrics:
    export:
      prometheus:
        enabled: true
  health:
    mongo:
      enabled: true

# AI Service Configuration
ai:
  service:
    provider: real  # Change to "real" to use actual AI service
    enabled: true
    base-url: http://breakup-ai-server:8000 # Replace with your AI service URL
    api-key: ${AI_SERVICE_API_KEY:your-api-key-here}
    timeout: 30000
    max-retries: 3
    retry-delay: 1000
    models:
      text-generation: gpt-3.5-turbo
      text-analysis: gpt-3.5-turbo
      transcription: whisper-1
      image-generation: dall-e-2
      language-detection: gpt-3.5-turbo
    rate-limit:
      requests-per-minute: 60
      requests-per-hour: 1000
      max-concurrent-requests: 10



