spring:
  application:
    name: breakup-stories-api
  profiles:
    active: prod
  # Virtual threads (Java 21 enabled)
  threads:
    virtual:
      enabled: ${SPRING_THREADS_VIRTUAL_ENABLED:true}

  # Timezone configuration for Indian Standard Time
  # Jackson configuration is handled in JacksonConfig.java

  # JVM timezone configuration
  jvm:
    timezone: Asia/Kolkata

  data:
    mongodb:
      # URI used when set (e.g. local profile). Prod uses host/port/username/password
      uri: ${SPRING_DATA_MONGODB_URI:}
      host: ${SPRING_DATA_MONGODB_HOST:${MONGO_HOST:localhost}}
      port: ${SPRING_DATA_MONGODB_PORT:${MONGO_PORT:27017}}
      database: ${SPRING_DATA_MONGODB_DATABASE:${MONGO_DATABASE:breakup_stories}}
      authentication-database: ${SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE:admin}
      auto-index-creation: false
      read-preference: ${SPRING_DATA_MONGODB_READ_PREFERENCE:primary}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

  # Gmail SMTP configuration for OTP emails
  mail:
    host: ${BREAKUP_MAIL_HOST:smtp.gmail.com}
    port: ${BREAKUP_MAIL_PORT:587}
    username: ${BREAKUP_MAIL_USERNAME:marava.technologies@gmail.com}
    password: ${BREAKUP_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: smtp.gmail.com
  servlet:
    multipart:
          max-file-size: 50MB
          max-request-size: 50MB

server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: 2592000000 # 30 days in milliseconds


# Admin Configuration
admin:
  email: ${ADMIN_EMAIL:kinneramadhu123@gmail.com}
  totp-secret: ${ADMIN_TOTP_SECRET}


logging:
  level:
    com.breakupstories: DEBUG
    org.springframework.security: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.mongodb.driver: INFO
    org.mongodb.driver.cluster: INFO
    org.mongodb.driver.connection: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
    disable-swagger-default-url: true
    display-request-duration: true
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
  paths-to-match: /api/**

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
  metrics:
    export:
      prometheus:
        enabled: true
  health:
    mongo:
      enabled: true

# Cloudinary Configuration for Breakup Stories
app:
  cloudinary:
    cloud-name: ${BREAKUP_CLOUDINARY_CLOUD_NAME}
    api-key: ${BREAKUP_CLOUDINARY_API_KEY}
    api-secret: ${BREAKUP_CLOUDINARY_API_SECRET}
  story:
    view-dedup-ttl-seconds: ${VIEW_DEDUP_TTL_SECONDS:1800} # Default 30 minutes


# Google Cloud Configuration for AI Processing
google:
  cloud:
    project-id: ${GOOGLE_CLOUD_PROJECT_ID:breakup-stories-464019}
    credentials:
      path: ${GOOGLE_CLOUD_CREDENTIALS_PATH:classpath:breakup-stories-464019-095fa901b79d.json}
  speech:
    supported-languages:
      te: "Telugu"
      hi: "Hindi"
      en: "English"
      ta: "Tamil"
      kn: "Kannada"
      ml: "Malayalam"

# OpenAI Configuration for AI Processing
openai:
  api:
    key: ${OPENAI_API_KEY}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    model: ${OPENAI_MODEL:gpt-4o}
    max-tokens: ${OPENAI_MAX_TOKENS:2048}


